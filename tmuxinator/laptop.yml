# /home/peter/.config/tmuxinator/laptop.yml

name: laptop
root: ~/
startup_pane: 1

windows:
  - general:
      layout: even-horizontal
      panes:
        - terminal:
            - scp -r -P 55555 peter@vpn.finclab.com:/home/peter/.lab $HOME
            - cd $HOME/.files && git pull
            - cd /lab/paper/finclab && git pull
            - cd /lab/paper/datalab_utilities && git pull
            - cd /lab/paper/ts && git pull
            - cd /lab/paper/winclient && git pull
            - cd /lab/paper/acap_gateway && git pull
            - cd /lab/paper
            - curl "wttr.in/newyork?m&lang=zh-cn"

  - python:
      layout: even-horizontal
      panes:
        - python:
            - cd /lab/paper
        - terminal:
            - cd /lab/paper

  - finclab:
      layout: even-horizontal
      panes:
        - workspace1:
            - cd /lab/paper
        - workspace2:
            - cd /lab/paper

  - datalab:
      layout: even-horizontal
      panes:
        - workspace1:
            - cd /lab/paper
        - workspace2:
            - cd /lab/paper

  - atronvim:
      layout: even-horizontal
      panes:
        - workspace1:
            - cd /lab/paper/astronvim

  - server-monitor:
      layout: tiled
      panes:
        - misc:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd /lab/paper
          #- glances

          # - docker-monitor:
          #     layout: tiled
          #     panes:
          #       - lazydocker:
          #         - docker run --rm -it -v /var/run/docker.sock:/var/run/docker.sock -v /home/peter/.config/lazydocker:/.config/jesseduffield/lazydocker lazyteam/lazydocker
          #       - cpu_temperature:
          #         - watch -n 10 -d sensors

  - background-apps:
      layout: tiled
      panes:
        - other:
            - cd /lab/paper
