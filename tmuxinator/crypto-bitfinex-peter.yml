name: crypto-bitfinex-peter
root: /lab/paper/ts/lean
# Specifies (by name or index) which window will be selected on project startup. If not set, the first window is used.
startup_window: "1"
# Specifies (by index) which pane of the specified window will be selected on project startup. If not set, the first pane is used.
startup_pane: 1

windows:
  - Live:
      layout: even-vertical
      panes:
        - main:
            - export latest_folder=$(find /lab/paper/ts/lean/ -maxdepth 1 -name "live-bitfinex-v*" -type d | sort -t '\0' -n | tail -n 1)
            - echo Running live Bitfinex-Peter account from location $latest_folder
            - cp $latest_folder\config.crypto-bitfinex-peter.prod.json $latest_folder\config.json
            - cd $latest_folder
            - ac live start . --brokerage Bitfine" --data-feed Bitfinex --data-provider Local
