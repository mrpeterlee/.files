name: live-aws-au1-peter-binance
root: /lab/paper/ts/lean
# Specifies (by name or index) which window will be selected on project startup. If not set, the first window is used.
startup_window: "1"
# Specifies (by index) which pane of the specified window will be selected on project startup. If not set, the first pane is used.
startup_pane: 1

windows:
  - Live:
      layout: even-vertical
      panes:
        - main:
            # - export LATEST_FOLDER=$(find /lab/paper/ts/lean/live -maxdepth 1 -name "crypto.peter-binance.cash*" -type d | sort -t '\0' -n | tail -n 1)
            # - export FOLDER_STEM="${LATEST_FOLDER%"${dirname##*[!/]}"}"
            # - FOLDER_STEM="${FOLDER_STEM##*/}"
            - export LATEST_FOLDER="/lab/paper/ts/lean/live/crypto.peter-binance.cash"
            - echo "Located live Binance-Peter folder from location '$LATEST_FOLDER'"
            - docker pull quantconnect/lean
            - cd /lab/paper/ts/lean && lean live deploy live/crypto.peter-binance.cash --brokerage Binance --data-provider-live Binance --binance-exchange-name Binance --binance-use-testnet live --data-provider-historical QuantConnect
