# /home/peter/.config/tmuxinator/work.yml

name: work
root: ~/
startup_pane: "1"

windows:
  - general:
      layout: even-horizontal
      panes:
        - terminal:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            # - python -m pip install lean --upgrade
            # - python -m pip install --no-binary lxml
            # - python -m pip install black --upgrade
            - cd /lab/lib
            # - /usr/bin/inxi
            - /usr/bin/screenfetch && curl "wttr.in/newyork?m&lang=zh-cn"
            - cd /mnt/diskstation-us1/nfs/public/vm/finclab/finclab/io/api/qmt

  - python:
      layout: even-horizontal
      panes:
        - python:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            # - sudo apt install neovim --upgrade
            # - nvim --headless -c 'autocmd User PackerComplete quitall' -c 'AstroUpdate' -c 'PackerClean' -c 'PackerSync' -c 'PackerCompile'
            - cd /lab/lib
            - nvim /lab/lib/finclab/__init__.py
        - terminal:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd /lab/lib

  - finclab:
      layout: even-horizontal
      panes:
        - workspace1:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd $HOME/lab/paper/finclab
            # - vim README.md
        - workspace2:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd $HOME/lab/paper/finclab

  - winclient:
      layout: even-horizontal
      panes:
        - workspace1:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd $HOME/lab/paper/winclient/
            - vim README.md
        - workspace2:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd $HOME/lab/paper/winclient/winclient

  - atronvim:
      layout: even-horizontal
      panes:
        - workspace1:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd /lab/paper/astronvim
            - vim init.lua
        - workspace2:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - vim $HOME/.tmux.conf.local

  - misc:
      layout: even-horizontal
      panes:
        - pane1:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd $HOME/lab/paper
        - pane2:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd $HOME/lab/paper
            # - ts flightlog stream -d

  - server-monitor:
      layout: tiled
      panes:
        - glances:
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - cd
          #- glances

          # - docker-monitor:
          #     layout: tiled
          #     panes:
          #       - lazydocker:
          #         - docker run --rm -it -v /var/run/docker.sock:/var/run/docker.sock -v /home/peter/.config/lazydocker:/.config/jesseduffield/lazydocker lazyteam/lazydocker
          #       - cpu_temperature:
          #         - watch -n 10 -d sensors

  - background:
      layout: tiled
      panes:
        - glances:
            - cd $HOME/lab/paper/finclab && git pull
            - cd $HOME/lab/paper/datalab && git pull
            - cd $HOME/lab/paper/ts && git pull
            - cd $HOME/lab/paper/winclient && git pull
            - cd $HOME/lab/paper/tradestation && git pull
            - cd $HOME/lab/paper/lab && git pull
            # Update xtquant lib
            - rm -rf /lab/lib/xtquant && cp /lab/data/app/xtquant.zip /lab/lib/xtquant.zip && cd /lab/lib && unzip -a xtquant.zip && rm -f xtquant.zip
            # Create Ramdisk to store lean data
            - mkdir /tmp/ramdisk/data
            - chmod 777 /tmp/ramdisk/data
            # - rm -f /lab/paper/ts/lean/cloud/data
            # - ln -sf /tmp/ramdisk/data /lab/paper/ts/lean/cloud/data
            # - rm -f /lab/paper/ts/lean/data
            # - ln -sf /tmp/ramdisk/data /lab/paper/ts/lean/data
            # - rsync -avH --delete /lab/data/samba/peter/data/lean/data/ /tmp/ramdisk/data
            - glances -w -t 5
              #- jupyter-notebook:
              #    - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
              #    - conda deactivate && conda activate paper
              #    - export JUPYTER_ASCENDING_EXECUTE_PORT=8888
              #    - export JUPYTER_PORT=8888
              #    - export JUPYTER_PORT_RETRIES=0
              #    - jupyter notebook --port=$JUPYTER_PORT --no-browser --NotebookApp.token="" --notebook-dir=$HOME
        - neovim-headless:
            - /lab/paper/datalab_core/datalab_core/bin/check_docker_image
            - /lab/paper/datalab_equities/datalab_equities/bin/check_docker_image
            - if [ "$SHELL" = "/bin/sh" ]; then zsh; fi;
            - nvim --headless --listen 10.1.1.100:60001
        #- make -C /lab/prod/labenv start
# Optional tmux socket
# socket_name: foo

# Note that the pre and post options have been deprecated and will be replaced by
# project hooks.

# Project hooks
# Runs on project start, always
# on_project_start: command
# Run on project start, the first time
# on_project_first_start: command
# Run on project start, after the first time
# on_project_restart: command
# Run on project exit ( detaching from tmux session )
# on_project_exit: command
# Run on project stop
# on_project_stop: command

# Runs in each window and pane before window/pane specific commands. Useful for setting up interpreter versions.
# pre_window: rbenv shell 2.0.0-p247

# Pass command line options to tmux. Useful for specifying a different tmux.conf.
# tmux_options: -f ~/.tmux.mac.conf

# Change the command to call tmux.  This can be used by derivatives/wrappers like byobu.
# tmux_command: byobu

# Specifies (by name or index) which window will be selected on project startup. If not set, the first window is used.
# startup_window: editor

# Specifies (by index) which pane of the specified window will be selected on project startup. If not set, the first pane is used.
# startup_pane: 1

# Controls whether the tmux session should be attached to automatically. Defaults to true.
# attach: false
