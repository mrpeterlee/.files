name: live-crypto-binance-peter
root: /lab/paper/ts/lean
# Specifies (by name or index) which window will be selected on project startup. If not set, the first window is used.
startup_window: "1"
# Specifies (by index) which pane of the specified window will be selected on project startup. If not set, the first pane is used.
startup_pane: 1

windows:
  - Live:
      layout: even-vertical
      panes:
        - main:
            - export LATEST_FOLDER=$(find /lab/paper/ts/lean/ -maxdepth 1 -name "live-binance-v*" -type d | sort -t '\0' -n | tail -n 1)
	        - export FOLDER_STEM="${LATEST_FOLDER%"${dirname##*[!/]}"}"
	        - FOLDER_STEM="${FOLDER_STEM##*/}"
	        - echo Located live Binance-Peter folder from location: "$LATEST_FOLDER" 
            - cd /lab/paper/ts/lean && lean live deploy $FOLDER_STEM --brokerage Binance --data-provider-live Binance --binance-exchange-name Binance --binance-use-testnet live --data-provider-historical QuantConnect
