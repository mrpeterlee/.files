name: cronlab
root: /lab/lib/aquamesh
# Specifies (by name or index) which window will be selected on project startup. If not set, the first window is used.
startup_window: Engine
# Specifies (by index) which pane of the specified window will be selected on project startup. If not set, the first pane is used.
startup_pane: 1

windows:
  - Engine:
      - cd /lab/lib/aquamesh/bin
      - python run.py
  - Cron-US:
      - cd /lab/lib/ts/cronlab
      - ipython
      - run cron_us_est.py
  - Cron-CN:
      - cd /lab/lib/ts/cronlab
      - ipython
      - run cron_cn.py
  - Cron-GB:
      - cd /lab/lib/ts/cronlab
      - ipython
      - run cron_gb.py
  - Cron-FR:
      - cd /lab/lib/ts/cronlab
      - ipython
      - run cron_fr.py
  - Cron-DE:
      - cd /lab/lib/ts/cronlab
      - ipython
      - run cron_de.py
  - Cron-Misc:
      layout: even-vertical
      panes:
        - AU:
            - cd /lab/lib/ts/cronlab
            - ipython
            - run cron_au.py
        - JP:
            - cd /lab/lib/ts/cronlab
            - ipython
            - run cron_jp.py
        - HK:
            - cd /lab/lib/ts/cronlab
            - ipython
            - run cron_hk.py
