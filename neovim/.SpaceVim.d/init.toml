# All SpaceVim option below [option] section
[options]
    automatic_update = false  # `:SPUpdate SpaceVim` for manual update
    # set spacevim theme. by default colorscheme layer is not loaded,
    # if you want to use more colorscheme, please load the colorscheme
    # layer

    colorscheme = "srcery"
    colorscheme_bg = "dark"

    # Disable guicolors in basic mode, many terminal do not support 24bit
    # true colors
    enable_guicolors = true

    default_indent = 4
    expand_tab = true

    filemanager = "nerdtree"
    # the below will slow down nerdtree
    enable_filetree_gitstatus = true

    project_rooter_patterns = ['.git/',
                               '_darcs/',
                               '.hg/',
                               '.bzr/',
                               '.svn/',
                               '.root/']
    enable_projects_cache = true
    projects_cache_num = 20


    # statusline:nerd fonts required
    statusline_separator = "nil"
    statusline_iseparator = "bar"
    statusline_inactive_separator = "fire"
    statusline_left_sections = [
        'winnr',
        'filename',
        'version control info'
        'search status',
    ]
    statusline_right_sections = [
        'major mode',
        'minor mode lighters'
        'fileformat',
        'input method',
        'cursorpos',
        'percentage'
    ]
    enable_statusline_display_mode = true
    enable_statusline_mode = false

    # snippet_engine = 'ultisnips'

    # Buffer
    buffer_index_type = 4
    enable_os_fileformat_icon = 1
    enable_tabline_filetype_icon = true

    bootstrap_before = "myspacevim#before"
    bootstrap_after = "myspacevim#after"

    # Autocmoplete
    autocomplete_method = "coc"  # Enable COC as the auto-completion engine
    # autocomplete_method = "deoplete"
    # File manager
    filetree_direction = "right"

    # NOTE: the value should be a list, and each item is the name of the plugin.
    #disabled_plugins = ["vim-python-pep8-indent"]

    # Snippet

    # Misc
    # vim_help_language = "cn"

    # Linter
    # lint_engine = "ale"
    lint_engine = "neomake"


