  name = "incsearch"


# ==================== Python IDE ==================== 
[[layers]]
  # Fast syntax highlighting
  name = "treesitter"

[[layers]]
  name = "autocomplete"
  auto_completion_delay = 50
  auto_completion_complete_with_key_sequence = "jj"
  auto_completion_complete_with_key_sequence_delay = 0.1
  autocomplete_parens = true
  auto_completion_return_key_behavior = "complete"  # choose between complete, smart
  auto_completion_tab_key_behavior = "smart"  # choose bewteen smart, complete, cycle


